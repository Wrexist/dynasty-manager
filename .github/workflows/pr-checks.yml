name: PR Checks
on:
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm run test
      - run: npm run build

  code-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Code review summary
        uses: actions/github-script@v7
        with:
          script: |
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });

            const stats = {
              added: files.filter(f => f.status === 'added').length,
              modified: files.filter(f => f.status === 'modified').length,
              removed: files.filter(f => f.status === 'removed').length,
              total: files.length,
              additions: files.reduce((sum, f) => sum + f.additions, 0),
              deletions: files.reduce((sum, f) => sum + f.deletions, 0),
            };

            const bigFiles = files
              .filter(f => f.changes > 100)
              .map(f => `| \`${f.filename}\` | +${f.additions} / -${f.deletions} |`)
              .join('\n');

            const body = [
              `## PR Stats`,
              `| Metric | Count |`,
              `|--------|-------|`,
              `| Files changed | ${stats.total} |`,
              `| Files added | ${stats.added} |`,
              `| Files modified | ${stats.modified} |`,
              `| Files removed | ${stats.removed} |`,
              `| Lines added | +${stats.additions} |`,
              `| Lines removed | -${stats.deletions} |`,
              ``,
              bigFiles ? `### Large changes (100+ lines)\n| File | Changes |\n|------|---------|\n${bigFiles}` : '',
            ].filter(Boolean).join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
